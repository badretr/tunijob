- hosts: web
  become: yes
  vars_files:
    - group_vars.yml

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install packages
      apt:
        name:
          - git
          - python3-pip
          - python3-venv
          - nginx
        state: present

    - name: Create project directory
      file:
        path: "{{ project_dir }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Clone project repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dir }}"
        version: main
        force: yes

    - name: Create virtualenv
      command: python3 -m venv "{{ venv_dir }}"
      args:
        creates: "{{ venv_dir }}/bin/activate"

    - name: Install requirements
      pip:
        requirements: "{{ project_dir }}/requirements.txt"
        virtualenv: "{{ venv_dir }}"

    - name: Run migrations
      command: "{{ venv_dir }}/bin/python manage.py migrate"
      args:
        chdir: "{{ project_dir }}"

    - name: Collect static files
      command: "{{ venv_dir }}/bin/python manage.py collectstatic --noinput"
      args:
        chdir: "{{ project_dir }}"

    - name: Create Gunicorn systemd service
      copy:
        dest: /etc/systemd/system/{{ gunicorn_service_name }}.service
        content: |
          [Unit]
          Description=gunicorn daemon for tunijob
          After=network.target

          [Service]
          User=ubuntu
          Group=www-data
          WorkingDirectory={{ project_dir }}
          Environment="DJANGO_SETTINGS_MODULE={{ django_settings_module }}"
          ExecStart={{ venv_dir }}/bin/gunicorn --access-logfile - --workers 3 --bind unix:{{ project_dir }}/gunicorn.sock core.wsgi:application

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      command: systemctl daemon-reload

    - name: Enable and start gunicorn
      systemd:
        name: "{{ gunicorn_service_name }}"
        enabled: yes
        state: started

    - name: Configure Nginx
      copy:
        dest: /etc/nginx/sites-available/tunijob
        content: |
          server {
              listen 80;
              server_name {{ server_name }};

              location = /favicon.ico { access_log off; log_not_found off; }
              location /static/ {
                  alias {{ project_dir }}/staticfiles/;
              }

              location / {
                  include proxy_params;
                  proxy_pass http://unix:{{ project_dir }}/gunicorn.sock;
              }
          }

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/tunijob
        dest: /etc/nginx/sites-enabled/tunijob
        state: link
        force: yes

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test Nginx configuration
      command: nginx -t

    - name: Restart Nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes
